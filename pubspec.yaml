name: market1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  flutter_facebook_auth: ^7.1.6
  cloud_firestore: ^5.6.12
  image_picker: ^1.2.1
  shared_preferences: ^2.2.2
  firebase_storage: ^12.1.0 
  geolocator: ^14.0.2
  google_maps_flutter: ^2.10.0
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_market.png"
  adaptive_icon_background: "#AF0303"
  adaptive_icon_foreground: "assets/logo_market.png"

flutter:
  uses-material-design: true

  assets:
    - assets/proyectoua.jpg
    - assets/google_logo.png
    - assets/logo_market.png
